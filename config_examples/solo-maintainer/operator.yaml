github_username: ""
review_style: "direct but kind"
auto_post: false
poll_interval_seconds: 600
digest_email: ""
digest_enabled: false

llm_backends:
  - provider: stub

# Recursive Language Model backend (v1.5, opt-in). Decomposes a large PR into
# per-file/per-hunk leaf reviews and aggregates them — useful when PRs are too
# big for a single prompt. It owns no model of its own: every leaf review is
# delegated to the cheap ``rlm.leaf`` backend below. Uncomment to enable.
#
# llm_backends:
#   - provider: rlm
#     rlm:
#       # execution: map-reduce (default) = deterministic in-process decomposition.
#       # execution: notebook = the model writes Python in a Jupyter notebook run
#       #   inside a --network=none container, with the PR bound to a CONTEXT
#       #   variable and helpers to call ANY model (llm(), models()), recurse on
#       #   sub-parts, and search the code (grep/search/find_files/read_file/
#       #   ripgrep). Worker-only (needs Docker + a jupyter image); falls back to
#       #   map-reduce when Docker is unavailable.
#       execution: map-reduce
#       image: python:3.12-slim     # notebook mode: use an image with nbclient+ipykernel
#       container_timeout: 300      # notebook mode: per-run wall-clock cap (s)
#       max_model_calls: 40         # notebook mode: brokered model-call budget
#       leaf:
#         provider: claude
#         model: claude-haiku-4-5-20251001   # cheap leaf for the fan-out
#         api_key_env: ANTHROPIC_API_KEY
#       max_depth: 2            # 1 = per-file only; 2 = split big files by hunk
#       max_sub_calls: 30       # hard cap on leaf calls per PR (cost guard)
#       leaf_token_budget: 8000 # below this, a unit is reviewed whole
#       total_token_budget: 200000
#       concurrency: 4
#       synthesis_call: false   # true = one extra leaf call to summarize

# Forge registry. Each entry is a named forge instance the operator wants
# to talk to. Project YAMLs reference an entry by ``name`` via ``forge:``.
# If you only use github.com, you can leave this empty and rely on the
# legacy ``github_token``/``github_username`` fields above — a default
# entry named "github" is synthesized automatically.
#
# forges:
#   - name: github
#     type: github
#     base_url: https://api.github.com
#     token: ${FRANK_GITHUB_TOKEN}
#     username: alice
#   - name: codeberg
#     type: forgejo
#     base_url: https://codeberg.org
#     token: ${FRANK_CODEBERG_TOKEN}
#   - name: work-gitea
#     type: gitea
#     base_url: https://git.work.example
#     token: ${FRANK_WORK_GITEA_TOKEN}
#   - name: gitlab
#     type: gitlab
#     base_url: https://gitlab.com
#     token: ${FRANK_GITLAB_TOKEN}

