owner: "your-org"
repo: "your-repo"
# Which forge entry from operator.yaml::forges to use. Defaults to "github"
# for back-compat; set to your forge name (e.g. "codeberg", "gitlab",
# "work-gitea") for non-GitHub projects.
# forge: "github"
review_context: "general open-source"
governance: "standard"
tone: "direct"
watched_paths: []
ignore_paths: []
frequent_contributors: []
enabled: true

llm_checks:
  - coverage          # flag new code paths with no new tests
  - pr-description    # nudge vague or template-only descriptions
  - security          # scan diff for common security anti-patterns

copypasta_enabled: true
copypasta_min_lines: 4
copypasta_scan_extensions: [".py"]

# Differential test runner (see docs/test-runner.md). Disabled by default.
# Pick exactly one of: container_image, dockerfile, auto_build.
# tests:
#   enabled: true
#   dockerfile: ".frank/Dockerfile"   # repo-checked-in Dockerfile
#   resource_tier: standard
#   workdir: /workspace
#   test_command: "python -m pytest {tests} --tb=short -q"

# Detect calls to third-party functions that are misused per their upstream
# docs (deprecated APIs, complexity-on-large-input, etc.). To enable, set
# llm_checks: ["api-misuse"] and flip enabled below. Issues network
# requests to PyPI / Maven Central, so it is disabled by default.
# llm_checks: ["api-misuse"]
# api_misuse:
#   enabled: false
#   registries: ["pypi", "maven"]
#   cache_ttl_days: 7
#   max_calls_per_pr: 30
#   scrape_hosted_docs: true

# Known CVE-affected file paths/patterns (merged with auto-detected from git log):
# cve_files:
#   - "src/auth/"
#   - "sql/catalyst/optimizer/**"

# v1.5+ features (uncomment when ready):
# jira:
#   enabled: false
#   server: ""
#   project_prefix: ""
# community_sources: []

# Agentic tool-use for the Claude backend (v1.5). Lets the reviewer search,
# read files, list symbols, and (optionally) compile/run tests while drafting.
# Every tool runs in a hardened, network-isolated container over the PR's
# checkout. Disabled by default. Reuses the `tests:` image (above) so
# compile/run_tests get the project's dependencies; rg/ctags/fd are detected
# at runtime and skipped gracefully when absent.
# agent_tools:
#   enabled: false
#   tools: ["grep", "find_files", "read_file", "list_symbols"]
#   max_iterations: 8
#   time_budget_seconds: 120
#   per_call_timeout_seconds: 20
#   resource_tier: light
#   # enable_compile: true
#   # build_command: "python -m mypy src/"   # required when enable_compile is true
#   # enable_run_tests: false
#   # toolchain_image: null                  # override; defaults to the tests image

