owner: "your-org"
repo: "your-repo"
# Defaults to "github". Set to a name from operator.yaml::forges to ingest
# from a different forge (e.g. "codeberg", "gitlab", "work-gitea").
# forge: "github"
review_context: "Team project with CI/CD"
governance: "standard"
tone: "constructive"
watched_paths: ["src/"]
ignore_paths: ["docs/"]
frequent_contributors: []
enabled: true
llm_checks: ["coverage"]

# Detect calls to third-party functions that are misused per their upstream
# docs (deprecated APIs, complexity-on-large-input, etc.). To enable, add
# "api-misuse" to llm_checks above and flip enabled below. Disabled by
# default because it issues network requests to PyPI / Maven Central.
# api_misuse:
#   enabled: false
#   registries: ["pypi", "maven"]
#   cache_ttl_days: 7
#   max_calls_per_pr: 30
#   scrape_hosted_docs: true

# v1.5+ features (uncomment when ready):
# jira:
#   enabled: false
#   server: ""
#   project_prefix: ""
# community_sources: []
