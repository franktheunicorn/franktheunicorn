owner: "your-org"
repo: "your-repo"
# Defaults to "github". Set to a name from operator.yaml::forges to ingest
# from a different forge (e.g. "codeberg", "gitlab", "work-gitea").
# forge: "github"
review_context: "Team project with CI/CD"
governance: "standard"
tone: "constructive"
watched_paths: ["src/"]
ignore_paths: ["docs/"]
frequent_contributors: []
enabled: true

llm_checks:
  - coverage          # flag new code paths with no new tests
  - security          # scan diff for common security anti-patterns
  - pr-description    # nudge vague or template-only descriptions
  - api-misuse        # deprecated/misused library APIs (needs network)

# api-misuse look-up config — only active when "api-misuse" is in llm_checks.
# api_misuse:
#   enabled: true
#   registries: ["pypi", "maven"]
#   cache_ttl_days: 7
#   max_calls_per_pr: 30
#   scrape_hosted_docs: true

copypasta_enabled: true
copypasta_min_lines: 4
copypasta_scan_extensions: [".py", ".ts", ".js"]
copypasta_llm_enabled: true

# Detect calls to third-party functions that are misused per their upstream
# docs (deprecated APIs, complexity-on-large-input, etc.). To enable, add
# "api-misuse" to llm_checks above and flip enabled below. Disabled by
# default because it issues network requests to PyPI / Maven Central.
# api_misuse:
#   enabled: false
#   registries: ["pypi", "maven"]
#   cache_ttl_days: 7
#   max_calls_per_pr: 30
#   scrape_hosted_docs: true

# v1.5+ features (uncomment when ready):
# jira:
#   enabled: false
#   server: ""
#   project_prefix: ""
# community_sources: []

# Recursive Language Model scoring/rejection judges (v1.5, opt-in, default off).
# These are *additive* — they never replace the sklearn rejection predictor.
# rlm_scoring:
#   interest_enabled: false        # produce the `llm_interest` scoring signal
#   rejection_judge_enabled: false # add an RLM second-opinion P(rejection)
#   rejection_combine: max         # max | average | rlm-only
#   leaf:
#     provider: claude
#     model: claude-haiku-4-5-20251001
#     api_key_env: ANTHROPIC_API_KEY
#   max_sub_calls: 20
#   leaf_token_budget: 8000
#   total_token_budget: 120000

