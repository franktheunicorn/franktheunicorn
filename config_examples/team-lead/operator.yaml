#     token: ${FRANK_GITHUB_TOKEN}
#   - name: codeberg
#     type: forgejo
#     base_url: https://codeberg.org
#     token: ${FRANK_CODEBERG_TOKEN}
#   - name: gitlab
#     type: gitlab
#     token: ${FRANK_GITLAB_TOKEN}

