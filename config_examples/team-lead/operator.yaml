github_username: ""
review_style: "thorough and constructive"
auto_post: false
poll_interval_seconds: 300
digest_email: ""
digest_enabled: true

llm_backends:
  - provider: claude
    model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"

# Forge registry — uncomment to ingest from non-GitHub forges. Each
# project YAML picks one by ``name``. Leaving this empty falls back to
# the legacy single-GitHub setup driven by ``github_token``.
#
# forges:
#   - name: github
