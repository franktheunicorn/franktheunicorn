# franktheunicorn operator config
# This is the single source of truth for all app configuration.
# Run `python manage.py setup_llm` for interactive setup.
#
# String values support ${ENV_VAR} expansion — use this for secrets
# so they never appear in config files.  Example:
#   github_token: "${FRANK_GITHUB_TOKEN}"

# --- App Settings ---

# Enable mock/demo mode with fixture data (no tokens needed).
mock_mode: false

# GitHub personal access token.  Use ${ENV_VAR} to read from environment.
github_token: "${FRANK_GITHUB_TOKEN}"

# Directory for persistent state (SQLite database, repos, etc.).
# Leave empty to use the default (./data).
# data_dir: ""

# Directory containing fixture JSON for mock mode.
# fixtures_dir: ""

# Directory containing local clones of monitored repos.
# repos_dir: ""

# Directory containing per-project YAML configs.
# Leave empty to auto-detect config/active/projects/ or config/examples/projects/.
# projects_dir: ""

# --- Operator Identity ---

# Your GitHub username — used for "operator is author" scoring and review attribution
github_username: "holdenk"

# Default review style/tone for draft comments
review_style: "direct but kind"

# Reviewer personality — controls the voice of internal content
# (dashboard summaries, digest emails, agent feedback).
# GitHub-posted comments remain professional regardless of personality.
# Default: "frank" (Frank the Unicorn). Set to "" to disable.
# Custom personalities: place a markdown file in config/active/personalities/
personality: "frank"

# Whether to auto-post draft comments to GitHub (default: false, always off in v0)
auto_post: false

# How often the worker polls GitHub for new PRs (in seconds)
poll_interval_seconds: 300

# Log level for the worker (CRITICAL/ERROR/WARNING/INFO/DEBUG/NOTSET).
# Override at the command line with `make worker-debug`, the runner's
# `--log-level=DEBUG` flag, or the FRANK_LOG_LEVEL env var.
log_level: "INFO"

# --- Email Digest ---
digest_email: ""
digest_enabled: false
# email:
#   smtp_host: "smtp.gmail.com"
#   smtp_port: 587
#   smtp_user: "you@gmail.com"
#   smtp_pass: "${REVIEW_AGENT_SMTP_PASS}"
#   from_address: "frank@example.com"
#   use_tls: true

# --- LLM Backend Configuration ---
# Multiple backends can run simultaneously. Each produces findings
# independently; results are combined and deduped via anti-patterns.
# Run `python manage.py setup_llm` for interactive configuration.
#
# Example: single backend (Claude)
# llm_backends:
#   - provider: "claude"
#     model: "claude-sonnet-4-20250514"
#     api_key_env: "ANTHROPIC_API_KEY"
#     temperature: 0.3
#     max_tokens: 4096
#
# Example: multiple backends (Claude for quality + local for speed)
# llm_backends:
#   - provider: "claude"
#     model: "claude-sonnet-4-20250514"
#     api_key_env: "ANTHROPIC_API_KEY"
#   - provider: "ollama"
#     model: "qwen2.5-coder:14b"
#     base_url: "http://localhost:11434"
#
# Available providers:
#   claude  — Anthropic (models: claude-sonnet-4-20250514, claude-opus-4-20250514)
#   openai  — OpenAI (models: gpt-4o, gpt-4o-mini)
#   gemini  — Google (models: gemini-2.5-flash, gemini-2.5-pro)
#   ollama  — Local via Ollama (models: qwen2.5-coder:3b/7b/14b/32b)
#
# Local models via Ollama (no API key needed):
#   Install Ollama: https://ollama.com/download
#   Pull a model:   ollama pull qwen2.5-coder:14b
#   Model sizes:    3b (~2GB), 7b (~5GB), 14b (~9GB), 32b (~20GB)
#   Apple Silicon:  8GB→3b, 16GB→7b, 32GB→14b (unified memory shared with OS)
#   NVIDIA VRAM:    6GB→7b, 12GB→14b, 24GB→32b
#
# Legacy single-backend format (still works):
# llm:
#   provider: "claude"
#   model: "claude-sonnet-4-20250514"
#   api_key_env: "ANTHROPIC_API_KEY"

