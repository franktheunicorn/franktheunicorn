# --- CLI review tools (optional) ---
# All three integrations below are subprocess wrappers around external
# code review CLIs. They run alongside the LLM backends; their findings
# pass through anti-pattern filtering and appear in the dashboard
# attributed by `sources` (e.g. ["coderabbit"], ["claude-cli"]).
#
# Each tool supports a `remote:` block that runs the CLI on a remote
# host over SSH. The remote host clones the project's git repo into
# `remote_workspace_dir` and runs the CLI there -- useful for
# offloading heavy reviews to a dedicated build box.
#
# Common remote block (uncomment under any tool below):
#   remote:
#     mode: "ssh"                      # "local" (default) | "ssh"
#     host: "review-worker.example.com"
#     user: "frank"
#     ssh_key_path: "/home/holden/.ssh/frank_review"
#     ssh_extra_args: ["-o", "StrictHostKeyChecking=no"]
#     # Custom ssh launcher -- some companies wrap ssh in their own helper
#     # (corp-ssh-helper, teleport's tsh, assh, ...). Defaults to "ssh".
#     # Accepts a string ("corp-ssh-helper --quiet") or a list
#     # (["tsh", "ssh", "--cluster=prod"]).
#     ssh_command: "ssh"
#     remote_workspace_dir: "/srv/frank-remote"
#     clone_url_template: "https://github.com/{owner}/{repo}.git"
#     prepare_timeout_seconds: 600
#
# `cli_path` for each tool below accepts either a bare binary name
# ("coderabbit") or a full command with arguments ("uv run --with
# coderabbit coderabbit", "docker run --rm myorg/coderabbit", "corp-runner
# coderabbit"). The string is shell-split, so quote paths containing
# spaces: cli_path: '"/opt/my tools/coderabbit"'.

# CodeRabbit CLI integration
# Install: npm install -g coderabbitai (or see https://docs.coderabbit.ai/cli)
# coderabbit:
#   enabled: true
#   cli_path: "coderabbit"             # or e.g. "uv run --with coderabbit coderabbit"
#   extra_args: []
#   # remote: { mode: "ssh", host: "review-worker.example.com", ... }

# Claude CLI integration
# Wraps `claude -p` in headless prompt mode. Auth is whatever the Claude
# CLI is configured with on the executing host (local user, or the SSH
# remote when remote.mode == "ssh").
# Install: https://claude.ai/download  (or `npm install -g @anthropic-ai/claude-cli`)
claude_cli:
  enabled: true
  cli_path: "claude"                 # or "uv run claude", "corp-wrap claude", ...
  model: ""                          # empty = CLI default (Sonnet)
  extra_args: []
  timeout_seconds: 300
  max_diff_chars: 60000              # diffs above this are truncated
  # remote: { mode: "ssh", host: "review-worker.example.com", ... }

# Snowflake code review CLI integration
# Mirrors CodeRabbit's invocation contract; expects the same
# `<file>:<line> - [Severity] <title>` block output.
# snowflake_review:
#   enabled: true
#   cli_path: "snowflake-code-review"  # or "docker run --rm myorg/snowflake-cli"
#   extra_args: []
#   deduplicate: true
#   # remote: { mode: "ssh", host: "review-worker.example.com", ... }

