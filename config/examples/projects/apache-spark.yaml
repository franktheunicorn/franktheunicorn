# Project config: Apache Spark
# ASF governance context — stricter review norms

owner: "apache"
repo: "spark"
review_context: "ASF governance — formal review required for all changes"
governance: "asf"

# Paths you care about most as a committer
watched_paths:
  - "sql/catalyst/"
  - "python/pyspark/"
  - "core/src/main/"

# Paths to skip (generated code, vendored deps, etc.)
ignore_paths:
  - "docs/"
  - "resource-managers/"

tone: "constructive and thorough"
test_expectations: "tests required for all new features and bug fixes"

# LLM sub-checks — each runs a focused prompt and feeds findings through
# the standard anti-pattern pipeline.  Add or remove as needed.
llm_checks:
  - coverage          # flags new code paths not covered by new tests
  - security          # scans diff for security anti-patterns
  - security-context  # broadens security scan with CVE-file context
  - pr-description    # nudges incomplete or vague PR descriptions
  - issue-link        # flags PRs missing a SPARK-xxxxx reference
  - api-misuse        # deprecated/complex API calls (needs network; see below)

# api-misuse look-up config.  Only active when "api-misuse" is in llm_checks.
# Issues requests to Maven Central (and optionally hosted Javadoc).
api_misuse:
  enabled: true
  registries: ["maven"]
  cache_ttl_days: 7
  max_calls_per_pr: 30
  scrape_hosted_docs: true

# Copy-pasta detection — flag blocks of code copied verbatim from other files
# in the repo (or identical to existing code outside the diff).
copypasta_enabled: true
copypasta_min_lines: 5
copypasta_scan_extensions: [".py", ".scala", ".java", ".sql"]
copypasta_llm_enabled: true

# People whose PRs you typically review or collaborate with
frequent_contributors:
  - "cloud-fan"
  - "dongjoon-hyun"
  - "HyukjinKwon"
  - "viirya"

enabled: true

# --- Alert mode (enabled by default for this project) ---
# Frank raises an alert — and emails you, when operator.yaml `alerts:` has a
# recipient configured — when someone raises a PR matching something you're
# working on, or when a security report is sitting in the queue or in triage.
# "Working on" always includes files touched by your own open Spark PRs;
# working_paths/working_keywords declare in-flight work that isn't visible
# on GitHub yet. Requires the master switch: `alerts.enabled: true` in
# operator.yaml.
alerts:
  enabled: true
  working_overlap: true     # PRs overlapping your in-flight work
  security_reports: true    # security reports filed against this project
  working_paths:
    - "core/src/main/scala/org/apache/spark/storage/"  # e.g. decommissioning work
    - "python/pyspark/sql/connect/"
  working_keywords:
    - "decommission"
    - "spark connect"

# Full-file + first-party-import context injected into review prompts.
# Bumped budgets for a large monorepo — reduces "can't see the surrounding
# code" false positives on catalyst/optimizer changes.
context:
  include_full_file: true
  include_first_party_imports: true
  total_token_budget: 8000
  per_file_token_cap: 3000
  import_depth: 1
  package_roots: ["sql", "core", "python"]

# Differential test runner (see docs/test-runner.md). Spark publishes a
# CI-grade test image upstream, so we use it as-is rather than rebuilding.
tests:
  enabled: true
  container_image: ghcr.io/apache/spark-test:latest
  resource_tier: heavy
  test_command: "python -m pytest {tests} --tb=short -q"

# --- v1.5 features ---

# JIRA integration — fetch ticket context for PRs referencing SPARK-xxxxx
jira:
  enabled: true
  server: "https://issues.apache.org/jira"
  project_prefix: "SPARK"

# Community context sources
community_sources:
  - type: mailing-list
    name: "Spark dev@"
    archive_url: "https://lists.apache.org/list.html?dev@spark.apache.org"
    timeout_seconds: 30
    cache_ttl_days: 7
    niceness_delay_seconds: 2.0
  # - type: discourse
  #   name: "Spark Forum"
  #   base_url: "https://forum.spark.example.com"
  # - type: discord
  #   name: "Spark Discord"
  #   guild_id: "YOUR_GUILD_ID"
  #   bot_token_env: "DISCORD_BOT_TOKEN"

# Cross-project downstream detection
downstream:
  - project: "spark-testing-base"
    repo: "holdenk/spark-testing-base"
    tracked_apis_file: "data/cache/downstream/spark-testing-base-imports.json"

# Posting mode — draft-only (default) or confidence-gated auto-posting
posting:
  mode: draft-only  # Change to "confidence-gated" to enable auto-posting
  confidence_threshold: 0.85
  bot_token_env: "GITHUB_TOKEN_BOT"

# Rejection predictor (v1.75) — opt-in. When enabled, findings are scored by
# a per-project sklearn model (auto-trained once enough operator actions
# accumulate) and high-P(rejection) findings are auto-suppressed.
# rejection_predictor_enabled: true

# --- v2 features ---

# Shepherding (v2) — opt-in. Drafts replies to reviewers on YOUR PRs and
# creates rebase/staleness alerts for them.
# shepherding_enabled: true

# Fine-tuned model — deployed after running `python manage.py fine_tune`
# fine_tuned_model:
#   enabled: true
#   provider: "ollama"
#   model: "franktheunicorn-spark-v1"
#   endpoint: "http://localhost:11434"
#   slot: "first-pass"       # first-pass | fast | primary | reasoning
#   refine_with: "primary"   # which backend refines the first-pass output

# Merge queue — track and merge PRs meeting configurable criteria
merge_queue:
  enabled: true
  required_approvals: 2
  require_ci_pass: true
  require_no_conflicts: true
  merge_script: "dev/merge_spark_pr.py"  # custom merge script
  auto_merge: false
  merge_method: "merge"    # merge | squash | rebase
