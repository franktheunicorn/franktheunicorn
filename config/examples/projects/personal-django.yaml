# Project config: personal Django app
# Side-project context — pragmatic, lighter review

owner: "holdenk"
repo: "my-django-app"
review_context: "personal side project — pragmatic review"
governance: "personal"

watched_paths:
  - "app/"
  - "templates/"

ignore_paths:
  - "static/vendor/"

tone: "friendly and brief"
test_expectations: "tests nice to have but not blocking"

frequent_contributors: []

enabled: true

# Differential test runner (see docs/test-runner.md). Auto-build mode: the
# worker generates a Dockerfile from these inputs the first time and caches
# the image until a requirements file changes.
tests:
  enabled: true
  resource_tier: light
  auto_build:
    base_image: python:3.12-slim
    requirements_files:
      - requirements.txt
      - requirements-test.txt
    setup_commands:
      - pip install -e .
