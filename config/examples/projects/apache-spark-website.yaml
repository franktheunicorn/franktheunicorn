# Project config: Apache Spark Website
# ASF governance — static site, lighter review requirements

owner: "apache"
repo: "spark-website"
review_context: "ASF governance — static website content"
governance: "asf"

watched_paths:
  - "site/"
  - "_layouts/"

ignore_paths:
  - "node_modules/"
  - "vendor/"

tone: "friendly and concise"
test_expectations: "build must pass, no broken links"

frequent_contributors:
  - "dongjoon-hyun"
  - "HyukjinKwon"

enabled: true

# Merge queue — custom merge script for ASF website deploys
merge_queue:
  enabled: true
  required_approvals: 1
  require_ci_pass: true
  require_no_conflicts: true
  merge_script: "dev/merge_spark_website_pr.sh"
  auto_merge: false
  merge_method: "squash"
