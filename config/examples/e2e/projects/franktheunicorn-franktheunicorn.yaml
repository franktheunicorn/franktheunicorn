# E2E test: monitor own repo with stub LLM.

owner: "franktheunicorn"
repo: "franktheunicorn"
review_context: "e2e self-test"
governance: "standard"
tone: "direct"
watched_paths: []
ignore_paths: []
frequent_contributors: []
enabled: true

llm_checks:
  - coverage
  - pr-description
  - security

copypasta_enabled: true
copypasta_min_lines: 4
copypasta_scan_extensions: [".py"]
