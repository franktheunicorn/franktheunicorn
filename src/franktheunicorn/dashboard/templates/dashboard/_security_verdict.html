<div style="background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem;">
    <h3 style="font-size: 0.9rem; margin-bottom: 0.5rem;">Operator Verdict</h3>

    <form hx-post="{% url 'dashboard:security_verdict' report.pk %}"
          hx-target="#verdict-area"
          hx-swap="innerHTML">
        {% csrf_token %}

        <div class="form-row" style="margin-bottom: 0.5rem;">
            <label style="min-width: 5rem; font-size: 0.85rem; font-weight: 600;">Status</label>
            <select name="status" style="font-size: 0.85rem;">
                <option value="new" {% if report.status == "new" %}selected{% endif %}>New</option>
                <option value="triaging" {% if report.status == "triaging" %}selected{% endif %}>Triaging</option>
                <option value="valid" {% if report.status == "valid" %}selected{% endif %}>Valid</option>
                <option value="invalid" {% if report.status == "invalid" %}selected{% endif %}>Invalid</option>
                <option value="duplicate" {% if report.status == "duplicate" %}selected{% endif %}>Duplicate</option>
                <option value="expected-behavior" {% if report.status == "expected-behavior" %}selected{% endif %}>Expected Behavior</option>
            </select>
        </div>

        <div class="form-row" style="margin-bottom: 0.5rem;">
            <label style="min-width: 5rem; font-size: 0.85rem; font-weight: 600;">CVE ID</label>
            <input type="text" name="matched_cve_id" value="{{ report.matched_cve_id }}" placeholder="CVE-YYYY-NNNNN (if duplicate)">
        </div>

        <div style="margin-bottom: 0.5rem;">
            <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem;">Notes</label>
            <textarea name="operator_notes" rows="3"
                      style="width: 100%; font-size: 0.85rem; padding: 0.3rem 0.5rem; border: 1px solid var(--border); border-radius: 4px;">{{ report.operator_notes }}</textarea>
        </div>

        <button class="action-btn approve" type="submit">Save Verdict</button>
    </form>
</div>
