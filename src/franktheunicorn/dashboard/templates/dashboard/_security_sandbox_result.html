<div style="background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem;">
    <h3 style="font-size: 0.9rem; margin-bottom: 0.5rem;">Sandbox Execution Result</h3>

    <div style="background: {% if report.sandbox_verdict == 'confirmed' %}var(--red-bg){% elif report.sandbox_verdict == 'not-reproduced' %}var(--green-bg){% else %}var(--orange-bg){% endif %}; border-left: 3px solid {% if report.sandbox_verdict == 'confirmed' %}var(--red){% elif report.sandbox_verdict == 'not-reproduced' %}var(--green){% else %}var(--orange){% endif %}; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem;">
        <strong>Verdict: {{ report.sandbox_verdict }}</strong>
    </div>

    {% if report.sandbox_result %}
    <details>
        <summary style="font-size: 0.85rem; cursor: pointer;">Output</summary>
        <pre style="font-size: 0.8rem; background: var(--bg); padding: 0.5rem; border-radius: 3px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; margin-top: 0.3rem;">{{ report.sandbox_result }}</pre>
    </details>
    {% endif %}
</div>
