name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=franktheunicorn --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check src/ tests/

      - name: Run Ruff format check
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy src/franktheunicorn/

      - name: Check migration conflicts
        run: python manage.py check_migration_conflicts

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: docker build -f docker/Dockerfile --target web .

      - name: Build worker image
        run: docker build -f docker/Dockerfile --target worker .

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for web to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T web python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"; then
              echo "Web service is healthy"
              exit 0
            fi
            echo "Waiting for web service... ($i/30)"
            sleep 5
          done
          echo "Web service failed to become healthy"
          docker compose logs
          exit 1

      - name: Verify root page renders
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:7742/)
          if [ "$status" != "200" ]; then
            echo "Root page returned HTTP $status, expected 200"
            docker compose logs
            exit 1
          fi
          echo "Root page returned HTTP 200"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
