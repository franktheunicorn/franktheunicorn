# franktheunicorn local development compose file
#
# Usage:
#   docker compose up
#
# This starts:
#   - web: Django dev server on http://localhost:8000
#   - worker: Polling worker that ingests PRs on an interval
#
# Both services share the same SQLite database via a mounted volume.
# By default, mock mode is enabled so no GitHub token is needed.

x-common: &common
  volumes:
    - ./data:/app/data
    - ./config:/app/config
  environment: &common-env
    # Secrets — referenced via ${VAR} in operator.yaml
    FRANK_GITHUB_TOKEN: ${FRANK_GITHUB_TOKEN:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    REVIEW_AGENT_SMTP_PASS: ${REVIEW_AGENT_SMTP_PASS:-}
    # Django infrastructure
    DJANGO_DEBUG: "true"

services:
  web:
    <<: *common
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
    ports:
      - "8000:8000"
    # Web runs migrations; worker waits for web to be healthy before starting.
    command: >
      sh -c "python manage.py migrate --run-syncdb &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  worker:
    <<: *common
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    environment:
      <<: *common-env
    command: python -m franktheunicorn.worker.runner
    depends_on:
      web:
        condition: service_healthy

  # --- Optional local LLM inference (start with --profile inference) --------
  # Usage: docker compose --profile inference up ollama

  ollama:
    image: ollama/ollama:latest
    profiles: ["inference"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    profiles: ["inference"]
    ports:
      - "8080:8080"
    volumes:
      - llama-models:/models
    # Mount your GGUF model and uncomment:
    # command: -m /models/your-model.gguf --host 0.0.0.0 --port 8080

  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["inference"]
    ports:
      - "8000:8000"
    # Requires GPU — uncomment and set model:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # command: --model <model-name> --host 0.0.0.0

volumes:
  ollama-models:
  llama-models:
