---
# franktheunicorn K8s deployment manifest (v2)
# Basic deployment: web (Django) + worker
# Usage: kubectl apply -f deploy.yaml
# Requires: FRANK_GITHUB_TOKEN and ANTHROPIC_API_KEY secrets

apiVersion: v1
kind: Namespace
metadata:
  name: franktheunicorn

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frank-config
  namespace: franktheunicorn
data:
  DJANGO_SETTINGS_MODULE: "franktheunicorn.settings"
  FRANK_DATA_DIR: "/data"
  FRANK_MOCK_MODE: "false"
  FRANK_POLL_INTERVAL: "300"
  DJANGO_DEBUG: "false"
  DJANGO_ALLOWED_HOSTS: "*"
  GUNICORN_WORKERS: "2"

---
# Create this secret manually:
# kubectl -n franktheunicorn create secret generic frank-secrets \
#   --from-literal=FRANK_GITHUB_TOKEN=ghp_... \
#   --from-literal=ANTHROPIC_API_KEY=sk-ant-...
apiVersion: v1
kind: Secret
metadata:
  name: frank-secrets
  namespace: franktheunicorn
type: Opaque
data: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frank-data
  namespace: franktheunicorn
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frank-web
  namespace: franktheunicorn
  labels:
    app: franktheunicorn
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: franktheunicorn
      component: web
  template:
    metadata:
      labels:
        app: franktheunicorn
        component: web
    spec:
      containers:
        - name: web
          image: franktheunicorn:latest
          # gunicorn, matching the Docker Compose web service — runserver is
          # Django's dev server and is not meant to face traffic.
          command:
            [
              "sh",
              "-c",
              "python manage.py migrate --run-syncdb && python manage.py collectstatic --noinput && gunicorn franktheunicorn.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-2} --worker-class gthread --threads 4 --timeout 90 --graceful-timeout 30 --max-requests 1000 --max-requests-jitter 100 --access-logfile -",
            ]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: frank-config
            - secretRef:
                name: frank-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: frank-data

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frank-worker
  namespace: franktheunicorn
  labels:
    app: franktheunicorn
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: franktheunicorn
      component: worker
  template:
    metadata:
      labels:
        app: franktheunicorn
        component: worker
    spec:
      containers:
        - name: worker
          image: franktheunicorn:latest
          command: ["python", "-m", "franktheunicorn.worker.runner"]
          envFrom:
            - configMapRef:
                name: frank-config
            - secretRef:
                name: frank-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: frank-data

---
apiVersion: v1
kind: Service
metadata:
  name: frank-web
  namespace: franktheunicorn
spec:
  selector:
    app: franktheunicorn
    component: web
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

